<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List Tracker</title>

    <!--I decided to give this code it's own CSS file as a whole-->
    <link rel="stylesheet" href="movies.css">

    <style> 
       

    </style>
</head>
<body>
    <header>
        <h1>Movie List Tracker</h1>
    </header>
    <main>
        <!-- We don't want this form to submit at this time: onsubmit="return false;" -->
        <form onsubmit="return false;">
             <div>
                <label for="txtMovie">Movie Name:</label>
                <input type="text" id="txtMovie" name="txtMovie" placeholder="ex, Movie Time">
             </div>

             <!--We can also add type= "button" to prevent the browser from assuming these are submit buttons
             and not just regular old plain buttons -->
            <button type="button" onclick="addMovie()">Add Movie</button>
            <button type="button" onclick="resetMovieList()">Reset List</button>

            <div id="divMovies">
                ...add a movie...
            </div>
        </form>
    </main>
    <!-- Include the JavaScript file -->
    <script src="movies.js"></script>
</body>
</html>
